<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Blog App</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f9;
}

header {
    background: #2c3e50;
    color: white;
    padding: 15px;
    text-align: center;
}

.container {
    max-width: 800px;
    margin: 20px auto;
    padding: 10px;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    background: #3498db;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #2980b9;
}

.delete-btn {
    background: #e74c3c;
    margin-top: 10px;
}

.delete-btn:hover {
    background: #c0392b;
}
</style>
</head>

<body>

<header>
    <h1>My Blog App</h1>
</header>

<div class="container">

    <div class="card">
        <h2>Create Post</h2>
        <input type="text" id="title" placeholder="Enter title">
        <textarea id="content" rows="4" placeholder="Write your content..."></textarea>
        <button onclick="addPost()">Add Post</button>
    </div>

    <div id="posts"></div>

</div>

<script>
let posts = JSON.parse(localStorage.getItem("posts")) || [];

function renderPosts() {
    const postContainer = document.getElementById("posts");
    postContainer.innerHTML = "";

    posts.forEach((post, index) => {
        postContainer.innerHTML += `
            <div class="card">
                <h3>${post.title}</h3>
                <p>${post.content}</p>
                <button class="delete-btn" onclick="deletePost(${index})">Delete</button>
            </div>
        `;
    });
}

function addPost() {
    const title = document.getElementById("title").value.trim();
    const content = document.getElementById("content").value.trim();

    if (title === "" || content === "") {
        alert("Please fill all fields");
        return;
    }

    posts.unshift({ title, content });
    localStorage.setItem("posts", JSON.stringify(posts));

    document.getElementById("title").value = "";
    document.getElementById("content").value = "";

    renderPosts();
}

function deletePost(index) {
    posts.splice(index, 1);
    localStorage.setItem("posts", JSON.stringify(posts));
    renderPosts();
}

renderPosts();
</script>

</body>
</html>
