<!DOCTYPE html>
<html>
<body>

<input id="user">
<input id="pass">
<button onclick="login()">Login</button>

<input type="file" id="file">
<button onclick="upload()">Upload</button>

<div id="feed"></div>

<script>
let token="";
const API="http://35.168.11.208:30007";

async function login(){
 const r=await fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:user.value,password:pass.value})});
 const d=await r.json();token=d.token;load();
}

async function upload(){
 const f=new FormData();
 f.append("file",file.files[0]);
 await fetch(API+"/upload",{method:"POST",headers:{Authorization:token},body:f});
 load();
}

async function load(){
 const r=await fetch(API+"/posts");
 const d=await r.json();
 feed.innerHTML="";
 d.forEach((p,i)=>{
  feed.innerHTML+=`<p>${p.user}</p><img src="${p.url}" width=200>`;
 });
}
</script>

</body>
</html>
