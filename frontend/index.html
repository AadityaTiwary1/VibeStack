<!DOCTYPE html>
<html>
<head>
<title>VibeStack</title>
<style>
body { background:#111; color:white; font-family:Arial; text-align:center; }
.container { width:600px; margin:auto; }
input,button { padding:8px; margin:5px; }
.card { background:#222; padding:10px; margin:10px; border-radius:10px; }
img,video { max-width:100%; border-radius:10px; }
</style>
</head>

<body>

<h1>VibeStack</h1>

<div class="container">

<input id="username" placeholder="username">
<input id="password" type="password" placeholder="password">
<br>
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<hr>

<input type="file" id="file" onchange="previewFile()">
<br>
<img id="preview" style="display:none;">
<br>
<button onclick="upload()">Upload</button>

<hr>

<div id="feed"></div>

</div>

<script>
const API = "http://35.168.11.208:30007";
let token = "";

function previewFile(){
  const file = document.getElementById("file").files[0];
  const preview = document.getElementById("preview");
  preview.src = URL.createObjectURL(file);
  preview.style.display="block";
}

async function register(){
  await fetch(API+"/register",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      username:username.value,
      password:password.value
    })
  });
  alert("Registered");
}

async function login(){
  const res = await fetch(API+"/login",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      username:username.value,
      password:password.value
    })
  });

  const data = await res.json();
  token = data.token;
  alert("Logged in");
}

async function upload(){
  const file = document.getElementById("file").files[0];
  if(!file) return alert("Select file");

  const form = new FormData();
  form.append("file",file);

  const res = await fetch(API+"/upload",{
    method:"POST",
    headers:{ Authorization: "Bearer " + token },
    body: form
  });

  alert(await res.text());
  loadFeed();
}

async function comment(i){
  const text = prompt("Comment:");
  await fetch(API+"/comment",{
    method:"POST",
    headers:{
      'Content-Type':'application/json',
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({ index:i, text })
  });
  loadFeed();
}

async function loadFeed(){
  const res = await fetch(API+"/posts");
  const data = await res.json();

  feed.innerHTML="";

  data.forEach((p,i)=>{
    const div=document.createElement("div");
    div.className="card";

    let media = `<img src="${p.url}">`;
    if(p.url.endsWith(".mp4")){
      media = `<video controls src="${p.url}"></video>`;
    }

    div.innerHTML=`
      <b>${p.user}</b><br>
      ${media}
      <br>
      <button onclick="comment(${i})">Comment</button>
      ${p.comments.map(c=>`<p>${c}</p>`).join("")}
    `;

    feed.appendChild(div);
  });
}

loadFeed();
</script>

</body>
</html>
