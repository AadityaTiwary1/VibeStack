<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibeStack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #06060f;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --accent: #7c5cfc;
    --accent-glow: rgba(124,92,252,0.35);
    --accent2: #fc5c7d;
    --text: #f0eeff;
    --muted: rgba(240,238,255,0.45);
    --radius: 16px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
  }

  /* ── ANIMATED BACKGROUND ── */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    overflow: hidden;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    animation: drift 18s ease-in-out infinite alternate;
  }
  .blob1 { width: 600px; height: 600px; background: var(--accent); top: -150px; left: -100px; animation-duration: 20s; }
  .blob2 { width: 500px; height: 500px; background: var(--accent2); bottom: -150px; right: -100px; animation-duration: 16s; animation-delay: -8s; }
  .blob3 { width: 350px; height: 350px; background: #5cf4fc; top: 40%; left: 50%; animation-duration: 24s; animation-delay: -4s; opacity: 0.1; }

  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(40px, 30px) scale(1.08); }
  }

  /* grain overlay */
  .bg::after {
    content: '';
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.03;
    pointer-events: none;
  }

  /* ── LAYOUT ── */
  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  /* ── CARD ── */
  .card {
    width: 100%; max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 44px 40px 40px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 40px 80px rgba(0,0,0,0.5), 0 0 60px var(--accent-glow);
    animation: rise 0.6s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(28px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── LOGO ── */
  .logo {
    display: block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 2px;
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 60%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  .tagline {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.5px;
    margin-bottom: 36px;
  }

  /* ── INPUTS ── */
  .field {
    position: relative;
    margin-bottom: 14px;
  }
  .field input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 14.5px;
    font-family: 'Outfit', sans-serif;
    font-weight: 400;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    caret-color: var(--accent);
  }
  .field input::placeholder { color: var(--muted); }
  .field input:focus {
    border-color: var(--accent);
    background: rgba(124,92,252,0.07);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  /* ── BUTTONS ── */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 22px;
  }
  .btn {
    padding: 13px 0;
    border-radius: 12px;
    border: none;
    font-family: 'Outfit', sans-serif;
    font-size: 14.5px;
    font-weight: 600;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    position: relative;
    overflow: hidden;
  }
  .btn:active { transform: scale(0.97); }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover {
    border-color: rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent) 0%, #9d79ff 100%);
    color: #fff;
    box-shadow: 0 6px 24px var(--accent-glow);
  }
  .btn-primary:hover {
    box-shadow: 0 8px 32px rgba(124,92,252,0.5);
    transform: translateY(-1px);
  }

  /* ── MESSAGE ── */
  #msg {
    min-height: 20px;
    font-size: 13px;
    margin-top: 16px;
    text-align: center;
    color: var(--muted);
    transition: color 0.2s;
  }
  #msg.error { color: var(--accent2); }
  #msg.success { color: #5cf4a8; }

  /* ── DIVIDER ── */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 24px 0 0;
    color: var(--muted); font-size: 12px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px; background: var(--border);
  }
</style>
</head>
<body>

<div class="bg">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>

<div class="page">
  <div class="card">
    <span class="logo">VibeStack</span>
    <p class="tagline">share what moves you</p>

    <div class="field">
      <input id="username" placeholder="Username" autocomplete="username" spellcheck="false">
    </div>
    <div class="field">
      <input id="password" type="password" placeholder="Password" autocomplete="current-password">
    </div>

    <div class="actions">
      <button class="btn btn-outline" onclick="register()">Register</button>
      <button class="btn btn-primary" onclick="login()">Log in →</button>
    </div>

    <p id="msg"></p>

    <div class="divider">end-to-end vibes only</div>
  </div>
</div>

<script>
const msgEl = document.getElementById('msg');

function setMsg(text, type = '') {
  msgEl.textContent = text;
  msgEl.className = type;
}

async function register() {
  const res = await fetch('http://54.209.110.38:30007/register', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });
  const data = await res.json();
  setMsg(data.msg, 'success');
}

async function login() {
  const res = await fetch('http://54.209.110.38:30007/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });
  const data = await res.json();
  if (data.token) {
    localStorage.setItem("token", data.token);
    window.location = "feed.html";
  } else {
    setMsg(data.msg, 'error');
  }
}

// allow Enter key
document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
