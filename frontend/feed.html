<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibeStack — Feed</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #06060f;
  --surface: rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --accent: #7c5cfc;
  --accent-glow: rgba(124,92,252,0.3);
  --accent2: #fc5c7d;
  --text: #f0eeff;
  --muted: rgba(240,238,255,0.45);
  --muted2: rgba(240,238,255,0.25);
  --radius: 16px;
  --nav-h: 68px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
}

nav {
  position: fixed;
  top: 0;
  width: 100%;
  height: var(--nav-h);
  background: rgba(6,6,15,0.9);
  display: flex;
  align-items: center;
  padding: 0 20px;
  z-index: 100;
}

.nav-logo {
  font-family: 'Bebas Neue';
  font-size: 28px;
  color: white;
}

main {
  padding-top: 90px;
  max-width: 1200px;
  margin: auto;
  column-count: 3;
  column-gap: 20px;
}

.post-card {
  background: var(--surface);
  margin-bottom: 20px;
  border-radius: var(--radius);
  overflow: hidden;
  break-inside: avoid;
}

.post-card img {
  width: 100%;
}

.post-body {
  padding: 10px;
}

input {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  border: none;
  margin-top: 8px;
}
button {
  margin-top: 5px;
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  background: var(--accent);
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<nav>
  <div class="nav-logo">VibeStack</div>
</nav>

<main id="feed"></main>

<script>
const BASE = "http://54.197.174.227:30007";
const token = localStorage.getItem("token");

if (!token) {
  alert("Login first");
  window.location = "index.html";
}

// 🔹 Load Posts
async function load() {
  const res = await fetch(BASE + "/posts");
  const data = await res.json();

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  data.forEach((p, i) => {
    const card = document.createElement("div");
    card.className = "post-card";

    card.innerHTML = `
      <img src="${p.url}">
      <div class="post-body">
        <b>${p.user}</b>

        ${p.comments.map(c => `<div>${c.user}: ${c.text}</div>`).join("")}

        <input id="c${i}" placeholder="Comment">
        <button onclick="comment(${i})">Post</button>
      </div>
    `;

    feed.appendChild(card);
  });
}

// 🔹 Comment
async function comment(i) {
  const text = document.getElementById("c" + i).value;

  await fetch(BASE + "/comment", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({ index: i, text })
  });

  load();
}

// 🔹 Upload (optional if you add UI later)
async function upload(file) {
  const form = new FormData();
  form.append("file", file);

  await fetch(BASE + "/upload", {
    method: "POST",
    headers: {
      Authorization: "Bearer " + token
    },
    body: form
  });

  load();
}

load();
</script>

</body>
</html>
