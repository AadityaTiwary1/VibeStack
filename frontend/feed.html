<!DOCTYPE html>
<html>
<body>

<h2>Feed ! </h2>

<input type="file" id="file">
<button onclick="upload()">Upload</button>

<p id="msg"></p>

<div id="feed"></div>

<script>
const token = localStorage.getItem("token")

// 🔐 FORCE LOGIN CHECK
if (!token) {
  alert("Please login first")
  window.location = "index.html"
}

// ================= UPLOAD =================
async function upload() {
  const f = file.files[0]
  if (!f) return alert("Select a file")

  const form = new FormData()
  form.append("file", f)

  const res = await fetch('http://54.225.39.189:30007/upload', {
    method: 'POST',
    headers: {
      Authorization: "Bearer " + token
    },
    body: form
  })

  const data = await res.json()
  msg.innerText = data.msg

  load()
}

// ================= LOAD POSTS =================
async function load() {
  const res = await fetch('http://54.225.39.189:30007/posts')
  const data = await res.json()

  feed.innerHTML = ""

  data.forEach((p, i) => {
    feed.innerHTML += `
      <div>
        <p><b>${p.user}</b></p>
        <img src="${p.url}" width="200"/>
        <br>
        <input id="c${i}" placeholder="comment">
        <button onclick="comment(${i})">Comment</button>
        ${p.comments.map(c => `<p>${c.user}: ${c.text}</p>`).join("")}
      </div>
      <hr>
    `
  })
}

// ================= COMMENT =================
async function comment(i) {
  const text = document.getElementById("c"+i).value

  const res = await fetch('http://54.225.39.189:30007/comment', {
    method: 'POST',
    headers: {
      'Content-Type':'application/json',
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({ index: i, text })
  })

  const data = await res.json()
  msg.innerText = data.msg

  load()
}

load()
</script>

</body>
</html>
